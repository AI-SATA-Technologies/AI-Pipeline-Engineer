<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Face Attendance System</title>
<link rel="stylesheet" href="index.css">
</head>
<body>
<div class="card">
  <div class="logo">🏫</div>
  <h1>Face Attendance System</h1>
  <p class="subtitle">AI-powered school attendance tracking</p>
  <nav class="nav">
    <a href="register.html" class="btn btn-primary">📷 Register Student</a>
    <a href="dashboard.html" class="btn btn-secondary">📊 Attendance Dashboard</a>
    <a href="/docs" class="btn btn-tertiary" target="_blank">📖 API Documentation</a>
  </nav>
  <div class="status">
    <span class="status-dot" id="dot"></span>
    <span id="status-text">Checking server...</span>
  </div>
</div>
<script>
  async function checkStatus() {
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      document.getElementById('dot').classList.add('online');
      const liveness = data.liveness_enabled ? '✓ Liveness ON' : '⚠ Liveness OFF';
      document.getElementById('status-text').textContent =
        `Server running | ${data.students_in_index} students | ${liveness}`;
    } catch {
      document.getElementById('status-text').textContent = 'Server not reachable';
    }
  }
  checkStatus();
</script>
</body>
</html>
