<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Face Attendance System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 48px 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); max-width: 480px; width: 90%; text-align: center; }
  .logo { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 1.8rem; color: #1a202c; margin-bottom: 8px; }
  .subtitle { color: #718096; margin-bottom: 40px; font-size: 0.95rem; }
  .nav { display: flex; flex-direction: column; gap: 14px; }
  .btn { display: block; padding: 16px 24px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: transform 0.1s, box-shadow 0.1s; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
  .btn-primary { background: #4f46e5; color: white; }
  .btn-secondary { background: #0ea5e9; color: white; }
  .btn-tertiary { background: #10b981; color: white; }
  .status { margin-top: 32px; padding: 12px 20px; border-radius: 8px; background: #f7fafc; font-size: 0.85rem; color: #718096; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a0aec0; margin-right: 6px; }
  .status-dot.online { background: #48bb78; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏫</div>
  <h1>Face Attendance System</h1>
  <p class="subtitle">AI-powered school attendance tracking</p>
  <nav class="nav">
    <a href="register.html" class="btn btn-primary">📷 Register Student</a>
    <a href="dashboard.html" class="btn btn-secondary">📊 Attendance Dashboard</a>
    <a href="/docs" class="btn btn-tertiary" target="_blank">📖 API Documentation</a>
  </nav>
  <div class="status">
    <span class="status-dot" id="dot"></span>
    <span id="status-text">Checking server...</span>
  </div>
</div>
<script>
  async function checkStatus() {
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      document.getElementById('dot').classList.add('online');
      const liveness = data.liveness_enabled ? '✓ Liveness ON' : '⚠ Liveness OFF';
      document.getElementById('status-text').textContent =
        `Server running | ${data.students_in_index} students | ${liveness}`;
    } catch {
      document.getElementById('status-text').textContent = 'Server not reachable';
    }
  }
  checkStatus();
</script>
</body>
</html>
