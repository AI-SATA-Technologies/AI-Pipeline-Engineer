<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Student</title>
<link rel="stylesheet" href="register.css">
</head>
<body>
<div class="header">
  <a href="index.html" class="back">← Back</a>
  <h1>Register New Student</h1>
</div>

<div class="layout">
  <div class="card">
    <h2>Student Information</h2>
    <div class="field">
      <label>Full Name *</label>
      <input id="name" type="text" placeholder="e.g. Ahmed Ali" required>
    </div>
    <div class="field">
      <label>Roll Number *</label>
      <input id="roll" type="text" placeholder="e.g. 2024-001" required>
    </div>
    <div class="field">
      <label>Class *</label>
      <input id="class" type="text" placeholder="e.g. Grade 5">
    </div>
    <div class="field">
      <label>Section</label>
      <input id="section" type="text" placeholder="e.g. A">
    </div>

    <div class="progress-wrap">
      <div class="progress-label">Captured: <span id="count">0</span> / <span id="total">20</span> photos</div>
      <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    </div>

    <div class="samples-grid" id="grid">
      <!-- filled dynamically -->
    </div>

    <button class="btn btn-start" id="btn-capture" onclick="startCapture()">📷 Start Camera & Capture</button>
    <button class="btn btn-submit" id="btn-submit" onclick="submitRegistration()" disabled>✅ Register Student</button>

    <div class="alert alert-success" id="alert-success"></div>
    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-info" id="alert-info"></div>
  </div>

  <div class="card">
    <h2>Live Camera Preview</h2>
    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="camera-off" id="cam-off">Camera not started</div>
    </div>
    <p style="color:#718096; font-size:0.82rem; margin-top:10px;">
      Look directly at the camera. Move your head slightly between captures for better accuracy.
    </p>
  </div>
</div>

<script>
const TOTAL = 20;
const INTERVAL_MS = 300;
let stream = null;
let blobs = [];
let capturing = false;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const div = document.createElement('div');
    div.className = 'sample-thumb empty';
    div.id = `thumb-${i}`;
    div.textContent = '○';
    grid.appendChild(div);
  }
}
buildGrid();

async function startCapture() {
  if (capturing) return;
  const name = document.getElementById('name').value.trim();
  const roll = document.getElementById('roll').value.trim();
  if (!name || !roll) {
    showAlert('error', 'Please fill in Name and Roll Number first.');
    return;
  }

  document.getElementById('btn-capture').disabled = true;
  showAlert('info', 'Starting camera...');

  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    const video = document.getElementById('video');
    video.srcObject = stream;
    document.getElementById('cam-off').style.display = 'none';
    await new Promise(r => video.onloadedmetadata = r);

    hideAlert('info');
    showAlert('info', 'Capturing photos... hold still.');
    capturing = true;
    blobs = [];

    const canvas = document.createElement('canvas');
    canvas.width = 640;
    canvas.height = 480;
    const ctx = canvas.getContext('2d');

    for (let i = 0; i < TOTAL; i++) {
      await new Promise(r => setTimeout(r, INTERVAL_MS));
      ctx.drawImage(video, 0, 0);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
      blobs.push(blob);

      const thumb = document.getElementById(`thumb-${i}`);
      thumb.className = 'sample-thumb';
      const img = document.createElement('img');
      img.src = URL.createObjectURL(blob);
      thumb.textContent = '';
      thumb.appendChild(img);

      document.getElementById('count').textContent = i + 1;
      document.getElementById('fill').style.width = `${((i + 1) / TOTAL) * 100}%`;
    }

    capturing = false;
    hideAlert('info');
    showAlert('success', `${TOTAL} photos captured. Click "Register Student" to save.`);
    document.getElementById('btn-submit').disabled = false;
  } catch (e) {
    showAlert('error', `Camera error: ${e.message}`);
    document.getElementById('btn-capture').disabled = false;
  }
}

async function submitRegistration() {
  if (blobs.length === 0) return;
  const name = document.getElementById('name').value.trim();
  const roll = document.getElementById('roll').value.trim();
  const cls  = document.getElementById('class').value.trim();
  const sec  = document.getElementById('section').value.trim();

  if (!name || !roll) {
    showAlert('error', 'Name and Roll Number are required.');
    return;
  }

  document.getElementById('btn-submit').disabled = true;
  showAlert('info', 'Registering student... please wait.');

  const form = new FormData();
  form.append('name', name);
  form.append('roll_number', roll);
  form.append('class_name', cls || 'Unknown');
  form.append('section', sec);
  blobs.forEach((b, i) => form.append('photos', b, `photo_${i}.jpg`));

  try {
    const res = await fetch('/api/register', { method: 'POST', body: form });
    const data = await res.json();
    hideAlert('info');
    if (data.success) {
      showAlert('success', `✅ ${name} registered successfully! (${data.samples_used} samples)`);
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      setTimeout(() => {
        document.getElementById('name').value = '';
        document.getElementById('roll').value = '';
        document.getElementById('class').value = '';
        document.getElementById('section').value = '';
        blobs = [];
        buildGrid();
        document.getElementById('count').textContent = '0';
        document.getElementById('fill').style.width = '0%';
        document.getElementById('btn-capture').disabled = false;
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('cam-off').style.display = '';
        document.getElementById('video').srcObject = null;
      }, 2000);
    } else {
      showAlert('error', `❌ ${data.error}`);
      document.getElementById('btn-submit').disabled = false;
    }
  } catch (e) {
    hideAlert('info');
    showAlert('error', `Network error: ${e.message}`);
    document.getElementById('btn-submit').disabled = false;
  }
}

function showAlert(type, msg) {
  ['success', 'error', 'info'].forEach(t => {
    document.getElementById(`alert-${t}`).style.display = t === type ? 'block' : 'none';
  });
  document.getElementById(`alert-${type}`).textContent = msg;
}
function hideAlert(type) {
  document.getElementById(`alert-${type}`).style.display = 'none';
}
</script>
</body>
</html>
